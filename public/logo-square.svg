<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c2030;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bg)" rx="40"/>
  
  <!-- Decorative border -->
  <rect x="30" y="30" width="340" height="340" fill="none" stroke="#c9a84c" stroke-width="3" rx="30"/>
  
  <!-- Main gazebo structure -->
  <g transform="translate(200, 100)">
    <!-- Top ornament -->
    <circle cx="0" cy="-15" r="12" fill="#c9a84c"/>
    <line x1="0" y1="-3" x2="0" y2="15" stroke="#e4c97a" stroke-width="6"/>
    
    <!-- Roof -->
    <path d="M -90 60 L 0 15 L 90 60" fill="none" stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
    <path d="M -75 70 L 0 30 L 75 70" fill="none" stroke="#e4c97a" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Canopy -->
    <path d="M -100 80 Q 0 50 100 80" fill="#c9a84c" opacity="0.3"/>
    <path d="M -100 80 Q 0 50 100 80" fill="none" stroke="#c9a84c" stroke-width="4"/>
    
    <!-- Columns -->
    <rect x="-80" y="80" width="12" height="110" fill="#c9a84c" rx="2"/>
    <rect x="-6" y="80" width="12" height="110" fill="#c9a84c" rx="2"/>
    <rect x="68" y="80" width="12" height="110" fill="#c9a84c" rx="2"/>
    
    <!-- Highlights -->
    <rect x="-78" y="80" width="4" height="110" fill="#e4c97a" opacity="0.5" rx="1"/>
    <rect x="-4" y="80" width="4" height="110" fill="#e4c97a" opacity="0.5" rx="1"/>
    <rect x="70" y="80" width="4" height="110" fill="#e4c97a" opacity="0.5" rx="1"/>
    
    <!-- Base -->
    <rect x="-100" y="190" width="200" height="16" fill="#c9a84c" rx="4"/>
    <rect x="-100" y="190" width="200" height="6" fill="#e4c97a" rx="2"/>
  </g>
  
  <!-- Company name -->
  <text x="200" y="330" font-family="serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    VINCEVIC
  </text>
  <text x="200" y="360" font-family="sans-serif" font-size="16" font-weight="600" fill="#c9a84c" text-anchor="middle" letter-spacing="4">
    SHADES INTERPRISES
  </text>
</svg>
