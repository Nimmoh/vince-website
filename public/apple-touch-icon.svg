<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c2030;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e4c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" fill="url(#bgGradient)" rx="40"/>
  
  <!-- Main structure -->
  <g transform="translate(90, 50)">
    <!-- Top ornament -->
    <circle cx="0" cy="-8" r="6" fill="url(#goldGradient)"/>
    <line x1="0" y1="-2" x2="0" y2="8" stroke="#e4c97a" stroke-width="3"/>
    
    <!-- Roof -->
    <path d="M -45 30 L 0 8 L 45 30" fill="none" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round"/>
    <path d="M -40 35 L 0 15 L 40 35" fill="none" stroke="#e4c97a" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Canopy -->
    <path d="M -50 40 Q 0 25 50 40" fill="#c9a84c" opacity="0.3"/>
    <path d="M -50 40 Q 0 25 50 40" fill="none" stroke="#c9a84c" stroke-width="2"/>
    
    <!-- Columns -->
    <rect x="-42" y="40" width="6" height="50" fill="url(#goldGradient)" rx="1"/>
    <rect x="-3" y="40" width="6" height="50" fill="url(#goldGradient)" rx="1"/>
    <rect x="36" y="40" width="6" height="50" fill="url(#goldGradient)" rx="1"/>
    
    <!-- Base -->
    <rect x="-50" y="90" width="100" height="8" fill="url(#goldGradient)" rx="2"/>
    <rect x="-50" y="90" width="100" height="3" fill="#e4c97a" rx="1"/>
  </g>
  
  <!-- Initials -->
  <text x="90" y="155" font-family="serif" font-size="24" font-weight="700" fill="#c9a84c" text-anchor="middle" letter-spacing="2">
    VS
  </text>
</svg>
